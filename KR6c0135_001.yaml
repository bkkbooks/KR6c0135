body:
  text: 大契丹國師中天竺摩竭陀國三藏法師慈賢譯鉢囉二合倪也二合鉢囉蜜多一𠶹哩二合那野素怛囉二合二阿哩也二合嚩路枳帝三濕嚩二合嚕四胃地怛舞二合五儼鼻㘕六鉢囉二合倪也二合播囉弭跢七左哩演二合左囉麼耨尾也二合八嚩嚕迦野九底娑麼半左塞建二合跢十娑跢二合室佐二合十一娑嚩二合婆嚩舜你焰二合十二鉢始底娑麼十三伊賀舍哩補怛囉二合十四嚕𠰢戍你也二合跢十五戍你也二合帶嚩嚕𠰢十六嚕𠰢拏必哩二合跢十七戍你也二合跢咩十八拏必哩二合跢嚕𠰢十九拽訥嚕二合伴二十娑舜你也二合跢二十一舜你也二合跢二十二娑嚕𠰢二十三翳嚩銘嚩二十四尾娜拏二十五僧擬惹二合僧娑伽囉二合二十六尾倪也二合喃二十七伊賀舍哩補怛囉二合二十八囉嚩二合達囉磨二合二十九戍你也二合跢𠸪乞義二合拏三十阿努怛播拏三十一阿努嚕䭾三十二阿麼攞三十三阿尾麼攞三十四阿努𢲉三十五阿鉢哩部囉拏二合三十六怛娑麼二合𢲉哩布怛囉二合三十七戍你也二合哆咩三十八嚕𠰢三十九拏吠那拏四十拏僧擬惹二合四十一拏僧塞迦二合囉四十二拏尾倪也二合捺四十三拏作屈芻二合四十四秫嚕二合怛囉二合四十五伽囉二合喃四十六𠰒賀嚩二合四十七迦野四十八摩曩悉四十九拏嚕播濕嚩二合巘䭾囉娑五十舍鉢囉二合瑟吒二合尾也二合五十一達囉磨二合五十二拏斫乞芻二合䭾覩五十三夜嚩拏麼努五十四尾倪也二合曩䭾覩五十五拏尾你也二合拏尾你也二合諾乞義二合喻欲五十六拏尾你也二合諾乞義二合喻五十七夜嚩拏惹囉喃五十八摩囉喃拏惹囉喃五十九摩囉喃諾乞義二合喻六十拏耨佉六十一三母䭾野六十二𩕳嚕達磨𠻱誐六十三拏倪也二合喃六十四拏鉢囉二合鉢底二合六十五拏畢三磨野六十六怛娑麼二合阿鉢囉二合鉢帝二合怛嚩二合六十七地怛嚩二合喃六十八鉢囉二合倪也二合鉢囉弭跢六十九沫室𭋸二合底也二合七十尾賀囉底也二合七十一唧哆嚩囉喃七十二唧哆嚩囉拏七十三拏娑底二合怛嚩二合七十四那怛囉二合娑跢二合七十五吠鉢哩惹二合七十六娑底訖㘓二合跢七十七瑟吒二合哩嚩二合拏七十八底哩二合尾也二合嚩悉體二合多七十九囉嚩二合沒䭾八十鉢囉二合倪也二合播囉弭哆八十一磨室哩二合底也二合八十二阿耨多囉三藐三沒地八十三阿鼻粹沒䭾八十四怛麼二合倪也二合䭾尾焰二合八十五鉢囉二合倪也二合播囉弭跢八十六摩賀滿覩嚕二合八十七摩賀尾你也二合滿怛囉二合八十八阿訥哆囉滿怛囉二合八十九阿三摩三麼滿怛囉二合九十囉嚩二合耨佉鉢囉二合舍摩拏九十一娑底也二合麼九十二蜜體曳二合怛嚩二合九十三鉢囉二合倪也二合播囉弭哆九十四穆骨覩二合滿怛囉二合九十五怛你也二合他九十六誐誐諦誐九十七播囉誐諦九十八播囉僧誐諦九十九播囉娑擔一百地一百一娑嚩二合賀引一百二
